<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f3460">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fotos Doca">
<title>Fotos Doca</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#0f3460;--pri-d:#0a2540;--pri-bg:#16213e;
  --acc:#e94560;--ok:#27ae60;--ok-d:#1e8449;
  --txt:#1a202c;--txt2:#4a5568;--txt3:#718096;
  --bg:#f0f4f8;--card:#fff;--bdr:#e2e8f0;
  --sh:0 4px 24px rgba(15,52,96,.10);--sh-h:0 8px 32px rgba(15,52,96,.18);
  --r:16px;--rs:10px;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5;overflow-x:hidden;width:100%}

/* HEADER */
.header{background:linear-gradient(135deg,var(--pri-bg),var(--pri));color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hd{max-width:1200px;margin:0 auto;padding:13px 16px;display:flex;align-items:center;gap:10px}
.hd h1{font-size:1.25rem;font-weight:700;letter-spacing:-.4px;flex:1}
.conn{display:flex;align-items:center;gap:6px;font-size:.75rem;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:99px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#27ae60;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dl-app-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap;transition:background .18s}
.dl-app-btn:hover{background:rgba(255,255,255,.28)}

/* INSTALL */
.inst-bar{background:linear-gradient(90deg,#1a1a2e,var(--pri-bg));color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:.85rem}
.inst-bar span{flex:1}
.inst-bar button{background:var(--acc);color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.82rem}
.inst-bar .xb{background:transparent!important;padding:4px 8px!important;opacity:.7}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:18px;display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:768px){.main{grid-template-columns:370px 1fr;align-items:start}}

/* CARD */
.card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.card h2{font-size:1rem;font-weight:700;color:var(--pri);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* PREVIEW */
.prev-wrap{position:relative;background:#f8fafc;border-radius:var(--rs);border:2px dashed var(--bdr);overflow:hidden;margin-bottom:13px;min-height:185px;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.prev-wrap.has-photo{border-style:solid;border-color:var(--pri)}
.prev-ph{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px;text-align:center;color:var(--txt3);font-size:.85rem}
.prev-ph svg{opacity:.35}
#photoPreview{width:100%;height:235px;object-fit:cover;display:none}
.rm-btn{position:absolute;top:8px;right:8px;background:rgba(233,69,96,.9);color:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* BUTTONS */
.cam-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 14px;border:none;border-radius:var(--rs);cursor:pointer;font-size:.88rem;font-weight:600;transition:background .18s,transform .1s;min-height:46px;font-family:inherit}
.btn:active{transform:scale(.96)}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-d)}
.btn-sec{background:#eef2f7;color:var(--pri);border:2px solid var(--bdr)}.btn-sec:hover{background:#e2e8f0}
.btn-save{width:100%;background:linear-gradient(135deg,var(--ok),var(--ok-d));color:#fff;font-size:.95rem;padding:14px;min-height:52px;margin-top:6px;box-shadow:0 4px 16px rgba(39,174,96,.28)}
.btn-save:hover:not(:disabled){background:linear-gradient(135deg,var(--ok-d),#196f3d)}
.btn-save:disabled{background:#c8d6d8;color:#aaa;cursor:not-allowed;box-shadow:none;transform:none!important}
.btn-dl{width:100%;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;padding:13px;font-size:.93rem}

/* DOCK INPUT */
.dock-sec label{display:block;font-size:.82rem;font-weight:600;color:var(--txt2);margin-bottom:7px}
.inp-wrap{position:relative}
.inp-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.inp{width:100%;padding:11px 11px 11px 37px;border:2px solid var(--bdr);border-radius:var(--rs);font-size:.96rem;color:var(--txt);background:#fff;transition:border-color .2s;font-family:inherit}
.inp:focus{outline:none;border-color:var(--pri)}
.inp::placeholder{color:#a0aec0}

/* PROGRESS */
.prog-wrap{margin-top:11px}
.prog-bar{background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--acc));border-radius:99px;transition:width .3s ease;width:0%}
.prog-lbl{text-align:center;font-size:.8rem;color:var(--txt3);margin-top:7px}

/* GALLERY */
.gal-sec{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.gal-head h2{font-size:1rem;font-weight:700;color:var(--pri);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.gal-ctrl{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.srch{flex:1;min-width:0;padding:10px 13px;border:2px solid var(--bdr);border-radius:var(--rs);font-size:.88rem;color:var(--txt);font-family:inherit;transition:border-color .2s}
.srch:focus{outline:none;border-color:var(--pri)}
.cnt{font-size:.76rem;color:var(--txt3);white-space:nowrap;background:#f0f4f8;padding:6px 11px;border-radius:99px}
.btn-del-all{display:flex;align-items:center;gap:5px;background:#fde8ec;color:var(--acc);border:1.5px solid #f5c6cf;padding:7px 11px;border-radius:var(--rs);cursor:pointer;font-size:.76rem;font-weight:600;white-space:nowrap;transition:background .15s,color .15s;font-family:inherit}
.btn-del-all:hover{background:var(--acc);color:#fff}
.btn-del-all:disabled{opacity:.4;cursor:not-allowed}

/* STATES */
.loading,.empty{display:flex;flex-direction:column;align-items:center;padding:38px;gap:13px;color:var(--txt3);font-size:.88rem;text-align:center}
.spin{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty svg{opacity:.28}

/* PHOTO GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}}

/* PHOTO CARD */
.pc{background:#fff;border-radius:var(--rs);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s}
.pc:hover{transform:translateY(-3px);box-shadow:var(--sh-h)}
.pc-img{position:relative;aspect-ratio:4/3;overflow:hidden;background:#f0f0f0;cursor:pointer}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.pc:hover .pc-img img{transform:scale(1.05)}
.pc-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;justify-content:flex-end;padding:8px;opacity:0;transition:opacity .2s}
.pc:hover .pc-ov{opacity:1}
.pdl{background:#fff;color:var(--pri);border:none;width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.22)}
.pc-info{padding:8px 10px 4px}
.dtag{font-size:.76rem;font-weight:700;color:var(--pri);background:#e8f0fe;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:3px}
.pc-date{font-size:.7rem;color:var(--txt3)}

/* CARD ACTIONS */
.pc-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bdr);margin-top:6px}
.pc-edit,.pc-del{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 4px;border:none;cursor:pointer;font-size:.75rem;font-weight:600;background:transparent;transition:background .15s,color .15s;font-family:inherit}
.pc-edit{color:var(--pri);border-right:1px solid var(--bdr)}
.pc-edit:hover{background:#e8f0fe}
.pc-del{color:var(--acc)}
.pc-del:hover{background:#fde8ec}
.pc-del.confirm{background:var(--acc);color:#fff;border-radius:0 0 var(--rs) 0}

/* MODAL GERAL */
.modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px)}
.modal-box{position:relative;z-index:1;background:#fff;border-radius:var(--r);overflow:hidden;max-width:480px;width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.mc{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;border:none;width:33px;height:33px;border-radius:50%;font-size:14px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}

/* MODAL FOTO */
.miw{overflow:hidden;max-height:55vh;background:#000;flex-shrink:0}
.miw img{width:100%;height:100%;object-fit:contain;display:block}
.mm{padding:16px;display:flex;flex-direction:column;gap:10px}
.mdock{display:flex;align-items:center;gap:7px;font-size:1.05rem;font-weight:700;color:var(--pri)}
.mdate{font-size:.8rem;color:var(--txt3)}
.modal-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-edit-sm{background:#e8f0fe;color:var(--pri);padding:11px;font-size:.85rem;border-radius:var(--rs);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600;font-family:inherit}
.btn-del-sm{background:#fde8ec;color:var(--acc);padding:11px;font-size:.85rem;border-radius:var(--rs);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600;font-family:inherit}
.btn-dl-sm{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;padding:11px;font-size:.85rem;border-radius:var(--rs);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600;font-family:inherit}

/* MODAL EDITAR */
.edit-body{padding:22px;display:flex;flex-direction:column;gap:14px}
.edit-body h3{font-size:1rem;font-weight:700;color:var(--pri)}
.edit-preview{width:100%;height:130px;object-fit:cover;border-radius:var(--rs);display:block;background:#f0f0f0}
.edit-inp{width:100%;padding:12px 14px;border:2px solid var(--bdr);border-radius:var(--rs);font-size:.96rem;color:var(--txt);font-family:inherit;transition:border-color .2s}
.edit-inp:focus{outline:none;border-color:var(--pri)}
.btn-edit-save{width:100%;background:linear-gradient(135deg,var(--ok),var(--ok-d));color:#fff;padding:13px;font-size:.93rem;border:none;border-radius:var(--rs);cursor:pointer;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px}

/* CÂMERA AO VIVO */
.cam-modal{position:fixed;inset:0;z-index:2000;background:#000;display:flex;flex-direction:column}
.cam-hdr{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent)}
.cam-cancel{color:#fff;background:rgba(255,255,255,.18);border:none;padding:8px 15px;border-radius:99px;cursor:pointer;font-size:.86rem;font-weight:600}
.cam-title{color:#fff;font-weight:600;font-size:.9rem}
.cam-flip{color:#fff;background:rgba(255,255,255,.18);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.cam-vwrap{flex:1;position:relative;overflow:hidden}
#camVideo{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center center}
.cam-ftr{position:absolute;bottom:0;left:0;right:0;padding:16px 24px 34px;display:flex;flex-direction:column;align-items:center;gap:14px;background:linear-gradient(to top,rgba(0,0,0,.72),transparent)}
.zoom-ctrl{display:flex;align-items:center;gap:10px;width:100%;max-width:300px}
.zoom-btn{color:#fff;background:rgba(255,255,255,.22);border:none;width:34px;height:34px;border-radius:50%;font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;user-select:none}
.zoom-btn:active{background:rgba(255,255,255,.5)}
.zoom-slider{flex:1;height:4px;cursor:pointer;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.3);border-radius:99px;outline:none}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.zoom-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.zoom-lbl{color:#fff;font-size:.82rem;font-weight:700;min-width:34px;text-align:center}
.shutter{width:74px;height:74px;border-radius:50%;border:4px solid #fff;background:rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .12s}
.shutter:active{transform:scale(.88);background:rgba(255,255,255,.55)}
.shutter-in{width:52px;height:52px;border-radius:50%;background:#fff;pointer-events:none}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a202c;color:#fff;padding:10px 20px;border-radius:99px;font-size:.86rem;font-weight:500;z-index:9999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}.toast.err{background:var(--acc)}.toast.info{background:var(--pri)}

@media(max-width:767px){
  .main{padding:8px;gap:10px;width:100%}
  .card,.gal-sec{padding:13px;width:100%;box-sizing:border-box}
  .grid{grid-template-columns:repeat(2,1fr);gap:9px}
  .hd{padding:11px 12px;gap:8px}
  .hd h1{font-size:1rem;min-width:0}
  .dl-app-btn{padding:6px 9px;font-size:.72rem;gap:4px}
  .conn{padding:4px 8px;font-size:.7rem}
  .modal-actions{grid-template-columns:1fr}
  /* gallery control row — badge+button wrap below search */
  .gal-ctrl{flex-wrap:wrap;gap:8px}
  .srch{flex:1 1 100%;order:0}
  .cnt{order:1}
  .btn-del-all{order:2;margin-left:auto}
  /* camera buttons */
  .cam-btns{gap:8px}
  .btn{font-size:.84rem;padding:10px 8px;gap:5px;min-height:44px}
  /* photo card actions */
  .pc-edit,.pc-del{font-size:.72rem;padding:8px 4px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="hd">
    <svg width="32" height="32" viewBox="0 0 192 192" style="flex-shrink:0">
      <rect width="192" height="192" rx="36" fill="#e94560"/>
      <path d="M44 72h24l14-20h28l14 20h24v68H44V72z" fill="none" stroke="white" stroke-width="10" stroke-linejoin="round"/>
      <circle cx="96" cy="106" r="26" fill="none" stroke="white" stroke-width="10"/>
      <circle cx="96" cy="106" r="11" fill="white"/>
      <rect x="52" y="82" width="14" height="9" rx="3" fill="white" opacity="0.7"/>
    </svg>
    <h1>Fotos Doca</h1>
    <button class="dl-app-btn" onclick="downloadApp()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar App
    </button>
    <div class="conn"><span class="dot"></span><span>Nuvem</span></div>
  </div>
</header>

<!-- INSTALL -->
<div class="inst-bar" id="installBar" style="display:none">
  <span>📱 Instale o app no seu celular!</span>
  <button id="installBtn">Instalar</button>
  <button class="xb" id="closeBar">✕</button>
</div>

<!-- MAIN -->
<main class="main">

  <!-- NOVA FOTO -->
  <section class="card">
    <h2>
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Nova Foto
    </h2>

    <div class="prev-wrap" id="previewWrap">
      <div class="prev-ph" id="previewPh">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#0f3460" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>Nenhuma foto selecionada</p>
        <small>Use os botões abaixo</small>
      </div>
      <img id="photoPreview" alt="Preview">
      <button class="rm-btn" id="rmBtn">✕</button>
    </div>

    <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="galInput" accept="image/*" style="display:none">

    <div class="cam-btns">
      <button class="btn btn-pri" id="openCam">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
        </svg>
        Câmera
      </button>
      <button class="btn btn-sec" id="openGal">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Galeria
      </button>
    </div>

    <div class="dock-sec" style="margin-bottom:6px">
      <label for="dockInput">Número da Doca *</label>
      <div class="inp-wrap">
        <svg class="inp-ico" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <input class="inp" type="text" id="dockInput" placeholder="Ex: DOCA-01, A12, 205…" autocomplete="off">
      </div>
    </div>

    <button class="btn btn-save" id="saveBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Salvar Foto
    </button>

    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <p class="prog-lbl" id="progLbl">Salvando…</p>
    </div>
  </section>

  <!-- GALERIA -->
  <section class="gal-sec">
    <div class="gal-head">
      <h2>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Fotos Registradas
      </h2>
      <div class="gal-ctrl">

<script>
// ── Supabase Config ───────────────────────────────────
// Preencha com suas credenciais: supabase.com → Settings → API
const SUPABASE_URL = 'https://mbnlgzjjbhgcnrjutecs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ibmxnempqYmhnY25yanV0ZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MTcwNTQsImV4cCI6MjA5OTM5MzA1NH0.wkSPT6vXbiOZGRIe2dfnKIguljg4W7OJPwqKzTMeXbE';
const BUCKET = 'fotos';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function dbSave(data) {
  const blob = await (await fetch(data.url)).blob();
  const { error: upErr } = await supa.storage.from(BUCKET).upload(data.fileName, blob, { contentType: 'image/jpeg', upsert: false });
  if (upErr) throw upErr;
  const { data: { publicUrl } } = supa.storage.from(BUCKET).getPublicUrl(data.fileName);
  const { data: row, error } = await supa.from('fotos').insert({
    dock_number: data.dockNumber, file_name: data.fileName,
    image_url: publicUrl, timestamp: data.timestamp
  }).select().single();
  if (error) throw error;
  return row.id;
}
async function dbUpdate(id, data) {
  const { error } = await supa.from('fotos').update({
    dock_number: data.dockNumber, file_name: data.fileName
  }).eq('id', id);
  if (error) throw error;
}
async function dbDelete(id) {
  const { data: row } = await supa.from('fotos').select('file_name').eq('id', id).single();
  if (row) await supa.storage.from(BUCKET).remove([row.file_name]);
  const { error } = await supa.from('fotos').delete().eq('id', id);
  if (error) throw error;
}
async function dbGetAll() {
  const { data, error } = await supa.from('fotos').select('*').order('timestamp', { ascending: false });
  if (error) throw error;
  return data.map(r => ({ id: r.id, dockNumber: r.dock_number, fileName: r.file_name, url: r.image_url, timestamp: r.timestamp }));
}
async function dbDeleteAll() {
  const { data: rows } = await supa.from('fotos').select('file_name');
  if (rows?.length) await supa.storage.from(BUCKET).remove(rows.map(r => r.file_name));
  const { error } = await supa.from('fotos').delete().gte('timestamp', 0);
  if (error) throw error;
}

// ── DOM ──────────────────────────────────────────────
const $=id=>document.getElementById(id);
const camInput=$('camInput'),galInput=$('galInput');
const photoPreview=$('photoPreview'),previewPh=$('previewPh'),rmBtn=$('rmBtn');
const dockInput=$('dockInput'),saveBtn=$('saveBtn');
const progWrap=$('progWrap'),progFill=$('progFill'),progLbl=$('progLbl');
const photoGrid=$('photoGrid'),galLoad=$('galLoad'),emptyState=$('emptyState'),cntBadge=$('cntBadge');
const searchInput=$('searchInput'),delAllBtn=$('delAllBtn');
const modal=$('modal'),modalBg=$('modalBg'),modalClose=$('modalClose');
const modalImg=$('modalImg'),modalDock=$('modalDock'),modalDate=$('modalDate');
const modalDlBtn=$('modalDlBtn'),modalEditBtn=$('modalEditBtn'),modalDelBtn=$('modalDelBtn');
const editModal=$('editModal'),editBg=$('editBg'),editClose=$('editClose');
const editPreview=$('editPreview'),editDockInput=$('editDockInput'),editSaveBtn=$('editSaveBtn');
const installBar=$('installBar'),installBtn=$('installBtn'),closeBar=$('closeBar');
const toast=$('toast'),previewWrap=$('previewWrap');
const camModal=$('camModal'),camVideo=$('camVideo'),camCancel=$('camCancel'),camFlip=$('camFlip'),captureBtn=$('captureBtn');
const zoomSlider=$('zoomSlider'),zoomLbl=$('zoomLbl'),zoomOut=$('zoomOut'),zoomIn=$('zoomIn');

// ── State ────────────────────────────────────────────
let currentPhoto=null,allPhotos=[],modalPhoto=null,editingPhoto=null;
let deferredPWA=null,cameraStream=null,facingMode='environment';
let currentZoom=1,zoomHardware=false,zoomCapMin=1,zoomCapMax=5;
let pinchDist0=0,pinchZoom0=1;

// ── Câmera ───────────────────────────────────────────
$('openCam').addEventListener('click',openCamera);
$('openGal').addEventListener('click',()=>galInput.click());
galInput.addEventListener('change',onFile);

async function openCamera(){
  if(!navigator.mediaDevices?.getUserMedia){camInput.click();return;}
  try{
    try{cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});}
    catch{cameraStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}
    camVideo.srcObject=cameraStream;
    // detect hardware zoom capability
    const track=cameraStream.getVideoTracks()[0];
    const caps=track.getCapabilities?.();
    if(caps?.zoom){
      zoomHardware=true; zoomCapMin=caps.zoom.min; zoomCapMax=caps.zoom.max;
      zoomSlider.step=caps.zoom.step||0.1;
    } else {
      zoomHardware=false; zoomCapMin=1; zoomCapMax=5; zoomSlider.step=0.1;
    }
    zoomSlider.min=zoomCapMin; zoomSlider.max=zoomCapMax;
    applyZoom(zoomCapMin);
    camModal.style.display='flex'; document.body.style.overflow='hidden';
  }catch(e){toast2('Câmera bloqueada. Verifique as permissões.','err');}
}
function applyZoom(z){
  currentZoom=Math.max(zoomCapMin,Math.min(zoomCapMax,+z||1));
  zoomSlider.value=currentZoom;
  zoomLbl.textContent=currentZoom.toFixed(1).replace(/\.0$/,'')+'×';
  if(zoomHardware){
    cameraStream?.getVideoTracks()[0]?.applyConstraints({advanced:[{zoom:currentZoom}]});
    camVideo.style.transform=facingMode==='user'?'scaleX(-1)':'none';
  } else {
    camVideo.style.transform=facingMode==='user'?`scale(${currentZoom}) scaleX(-1)`:`scale(${currentZoom})`;
  }
}
function closeCamera(){
  cameraStream?.getTracks().forEach(t=>t.stop());
  cameraStream=null; camVideo.srcObject=null; camVideo.style.transform='none';
  camModal.style.display='none'; document.body.style.overflow='';
}
camCancel.addEventListener('click',closeCamera);
camFlip.addEventListener('click',async()=>{facingMode=facingMode==='environment'?'user':'environment';closeCamera();await openCamera();});

// zoom controls
zoomSlider.addEventListener('input',()=>applyZoom(zoomSlider.value));
zoomOut.addEventListener('click',()=>applyZoom(currentZoom-(zoomCapMax-zoomCapMin)/10));
zoomIn.addEventListener('click',()=>applyZoom(currentZoom+(zoomCapMax-zoomCapMin)/10));

// pinch-to-zoom (touch)
const camVwrap=document.querySelector('.cam-vwrap');
camVwrap.addEventListener('touchstart',e=>{if(e.touches.length===2){e.preventDefault();pinchDist0=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);pinchZoom0=currentZoom;}},{passive:false});
camVwrap.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);applyZoom(pinchZoom0*d/pinchDist0);}},{passive:false});

// scroll wheel zoom (desktop)
camVwrap.addEventListener('wheel',e=>{e.preventDefault();applyZoom(currentZoom+(e.deltaY<0?0.2:-0.2));},{passive:false});

captureBtn.addEventListener('click',()=>{
  if(!camVideo.videoWidth)return;
  const c=document.createElement('canvas');
  c.width=camVideo.videoWidth; c.height=camVideo.videoHeight;
  const ctx=c.getContext('2d');
  if(facingMode==='user'){ctx.translate(c.width,0);ctx.scale(-1,1);}
  if(!zoomHardware&&currentZoom>1){
    // crop center to match what's visible on screen
    const sw=c.width/currentZoom, sh=c.height/currentZoom;
    ctx.drawImage(camVideo,(c.width-sw)/2,(c.height-sh)/2,sw,sh,0,0,c.width,c.height);
  } else {
    ctx.drawImage(camVideo,0,0);
  }
  c.toBlob(blob=>{setPhoto({file:new File([blob],'camera.jpg',{type:'image/jpeg'}),dataUrl:c.toDataURL('image/jpeg',.85)});closeCamera();},'image/jpeg',.85);
});

function setPhoto(p){
  currentPhoto=p;
  photoPreview.src=p.dataUrl; photoPreview.style.display='block';
  previewPh.style.display='none'; rmBtn.style.display='flex';
  previewWrap.classList.add('has-photo'); checkSave();
}
function onFile(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>setPhoto({file:f,dataUrl:ev.target.result});
  r.readAsDataURL(f); e.target.value='';
}
rmBtn.addEventListener('click',clearPhoto);
function clearPhoto(){
  currentPhoto=null; photoPreview.style.display='none'; photoPreview.src='';
  previewPh.style.display='flex'; rmBtn.style.display='none';
  previewWrap.classList.remove('has-photo'); checkSave();
}

// ── Salvar ───────────────────────────────────────────
dockInput.addEventListener('input',checkSave);
function checkSave(){saveBtn.disabled=!(currentPhoto&&dockInput.value.trim());}

saveBtn.addEventListener('click',async()=>{
  if(!currentPhoto||!dockInput.value.trim())return;
  const dock=dockInput.value.trim();
  const now=new Date(),pad=n=>String(n).padStart(2,'0');
  const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  saveBtn.disabled=true; progWrap.style.display='block';
  progFill.style.width='30%'; progLbl.textContent='Salvando…';
  try{
    await dbSave({dockNumber:dock,fileName:`DOCA-${dock}_${stamp}.jpg`,url:currentPhoto.dataUrl,timestamp:now.getTime()});
    progFill.style.width='100%'; progLbl.textContent='Salvo!';
    setTimeout(()=>{resetSave();clearPhoto();dockInput.value='';loadPhotos();toast2('Foto salva!','ok');},500);
  }catch(e){toast2('Erro: '+e.message,'err');resetSave();}
});
function resetSave(){saveBtn.disabled=false;checkSave();progWrap.style.display='none';progFill.style.width='0%';}

// ── Galeria ──────────────────────────────────────────
async function loadPhotos(){
  try{allPhotos=await dbGetAll();}catch{allPhotos=[];}
  galLoad.style.display='none'; render();
}
searchInput.addEventListener('input',render);

function render(){
  const q=searchInput.value.trim().toLowerCase();
  const list=q?allPhotos.filter(p=>p.dockNumber.toLowerCase().includes(q)||p.fileName.toLowerCase().includes(q)):allPhotos;
  cntBadge.textContent=`${list.length} foto${list.length!==1?'s':''}`;
  delAllBtn.disabled=!allPhotos.length;
  if(!list.length){photoGrid.innerHTML='';emptyState.style.display='flex';return;}
  emptyState.style.display='none';
  photoGrid.innerHTML=list.map(p=>{
    const d=new Date(p.timestamp);
    const ds=d.toLocaleDateString('pt-BR'),ts=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="pc" data-id="${p.id}">
      <div class="pc-img" data-id="${p.id}">
        <img src="${p.url}" alt="Doca ${p.dockNumber}" loading="lazy">
        <div class="pc-ov">
          <button class="pdl" data-id="${p.id}" title="Baixar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="pc-info"><span class="dtag">Doca: ${p.dockNumber}</span><div class="pc-date">${ds} ${ts}</div></div>
      <div class="pc-actions">
        <button class="pc-edit" data-id="${p.id}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar
        </button>
        <button class="pc-del" data-id="${p.id}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
          Apagar
        </button>
      </div>
    </div>`;
  }).join('');

  photoGrid.querySelectorAll('.pc-img').forEach(el=>el.addEventListener('click',()=>openModal(Number(el.dataset.id))));
  photoGrid.querySelectorAll('.pdl').forEach(el=>el.addEventListener('click',ev=>{ev.stopPropagation();dlPhoto(getP(Number(el.dataset.id)));}));
  photoGrid.querySelectorAll('.pc-edit').forEach(el=>el.addEventListener('click',ev=>{ev.stopPropagation();openEdit(Number(el.dataset.id));}));
  photoGrid.querySelectorAll('.pc-del').forEach(el=>el.addEventListener('click',ev=>{ev.stopPropagation();handleDelete(el,Number(el.dataset.id));}));
}
function getP(id){return allPhotos.find(p=>p.id===id);}

// ── Delete com confirmação ───────────────────────────
let deleteTimer=null;
function handleDelete(btn,id){
  if(btn.classList.contains('confirm')){
    clearTimeout(deleteTimer);
    deleteTimer=null;
    doDelete(id);
  } else {
    btn.classList.add('confirm');
    btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Confirmar`;
    deleteTimer=setTimeout(()=>{
      btn.classList.remove('confirm');
      btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg> Apagar`;
    },3000);
  }
}
async function doDelete(id){
  try{
    await dbDelete(id);
    if(modalPhoto?.id===id) closeModal();
    await loadPhotos();
    toast2('Foto apagada!','ok');
  }catch(e){toast2('Erro ao apagar: '+e.message,'err');}
}

function dlPhoto(p){

  const a=document.createElement('a');
  a.href=p.url; a.download=p.fileName||`DOCA-${p.dockNumber}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

}

// ── Download app ─────────────────────────────────────
async function downloadApp(){
  toast2('Preparando arquivo…','info');
  try{
    const res=await fetch(location.href);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='fotos-doca.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url); toast2('App baixado!','ok');
  }catch{
    const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='fotos-doca.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url); toast2('App baixado!','ok');
  }
}

// ── PWA ──────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPWA=e;installBar.style.display='flex';});
installBtn.addEventListener('click',async()=>{
  if(!deferredPWA)return;
  deferredPWA.prompt();
  const{outcome}=await deferredPWA.userChoice;
  if(outcome==='accepted')toast2('App instalado!','ok');
  deferredPWA=null; installBar.style.display='none';
});
closeBar.addEventListener('click',()=>{installBar.style.display='none';});

// ── Toast ────────────────────────────────────────────
let tt;
function toast2(msg,type='info'){
  toast.textContent=msg; toast.className=`toast show ${type}`;
  clearTimeout(tt); tt=setTimeout(()=>{toast.className='toast';},3000);
}

// ── Apagar tudo ──────────────────────────────────────
delAllBtn.addEventListener('click',async()=>{
  if(!allPhotos.length)return;
  if(!confirm(`Apagar todas as ${allPhotos.length} foto${allPhotos.length!==1?'s':''}? Isso não pode ser desfeito.`))return;
  delAllBtn.disabled=true;
  try{
    await dbDeleteAll();
    await loadPhotos();
    toast2('Todas as fotos apagadas!','ok');
  }catch(e){toast2('Erro: '+e.message,'err');}
  delAllBtn.disabled=false;
});

// ── Init ─────────────────────────────────────────────
loadPhotos();
  supa.channel('fotos-realtime').on('postgres_changes',{event:'*',schema:'public',table:'fotos'},()=>{loadPhotos();}).subscribe();
</script>
